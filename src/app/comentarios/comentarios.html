<section class="comentarios-container">
  <h2>Comments</h2>

  <!-- Lista de comentários existentes -->
  <div class="comment-list">
    <div *ngIf="comments.length === 0" class="no-comments">
      There are no comments yet. Be the first to comment!
    </div>
    <div *ngFor="let comment of comments" class="comment">
      <div class="comment-header">
        <span class="comment-author">{{ comment.name }}</span>
        <span class="comment-timestamp">
          {{ comment.timestamp | date:'MM/dd/yyyy HH:mm' }}
        </span>
      </div>
      <p class="comment-text">{{ comment.text }}</p>
    </div>
  </div>

  <!-- Formulário para novo comentário -->
  <div class="new-comment-form">
    <h3>Leave your name and comment</h3>
    <input type="text" [(ngModel)]="newCommentName" placeholder="Your name" />
    <textarea [(ngModel)]="newCommentText" placeholder="Write your comment here..." rows="4"></textarea>
    <button (click)="submitComment()" [disabled]="!newCommentName.trim() || !newCommentText.trim()">Submit</button>
  </div>
</section>
